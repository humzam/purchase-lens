<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #333;
      width: 240px;
      padding: 14px 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #111;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .row:last-of-type { border-bottom: none; }
    .label { color: #666; }
    .value { font-weight: 500; }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 6px;
      background: #f5a623;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: #e0951a; }
    #status-msg {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>📦 Purchase Lens</h1>

  <div class="row">
    <span class="label">Orders cached</span>
    <span class="value" id="order-count">—</span>
  </div>
  <div class="row">
    <span class="label">Last synced</span>
    <span class="value" id="last-fetched">—</span>
  </div>

  <button id="clear-btn">Clear Cache &amp; Re-sync</button>
  <div id="status-msg"></div>
  <div style="margin-top:10px;text-align:center">
    <a id="debug-link" href="#" style="font-size:11px;color:#888;">Open scrape debugger</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
